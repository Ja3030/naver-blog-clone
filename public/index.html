<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<title>블로그 홈</title>
<link rel="stylesheet" href="/assets/css/naver-blog.css">
<style>
body { margin: 0; padding: 0; background: #f5f6f8; }
.home_wrap { max-width: 768px; margin: 0 auto; background: #fff; min-height: 100vh; }
.home_header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
.home_header h1 { font-size: 18px; color: #333; margin: 0; font-weight: 700; }
.home_header .sub { font-size: 13px; color: #999; margin-top: 4px; }
.post_list { padding: 0; }
.post_item { padding: 20px; border-bottom: 1px solid #f0f0f0; }
.post_item a { text-decoration: none; color: inherit; display: block; }
.post_item .category { font-size: 12px; color: #00c73c; font-weight: 600; margin-bottom: 6px; }
.post_item .title { font-size: 16px; color: #333; font-weight: 700; line-height: 1.4; margin-bottom: 8px; }
.post_item .excerpt { font-size: 13px; color: #888; line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.post_item .meta { font-size: 12px; color: #bbb; }
.post_item .meta span { margin-right: 12px; }
.empty_state { padding: 60px 20px; text-align: center; color: #999; font-size: 14px; }
</style>
</head>
<body>
<div class="home_wrap">

<!-- 상단 헤더 -->
<div class="Ngnb gnb_bg_white">
  <div class="Ngnb_service logo_blog_green">
    <h1 class="Nservice_item">
      <a href="/"><img src="/assets/icons/blog-logo.svg" width="18" height="18" alt=""> <span class="Nicon_service">블로그</span></a>
    </h1>
    <h2 class="gnb_title">
      <div class="center">
        <span class="td">
          <a href="/"><span class="ell">블로그 홈</span></a>
        </span>
      </div>
    </h2>
  </div>
  <div class="Ngnb_tool">
    <a href="#" class="Ntool_button"><img src="/assets/icons/search.svg" width="20" height="20" alt="검색"></a>
    <button type="button" class="Ntool_button"><img src="/assets/icons/menu.svg" width="20" height="20" alt="메뉴"></button>
  </div>
</div>

<!-- 글 목록 -->
<div class="post_list">

  <div class="post_item">
    <a href="/posts/tonsil-stone/">
      <div class="category">건강·의학</div>
      <div class="title">편도결석 5년차가 알려주는 면봉 없이 사는 법</div>
      <div class="excerpt">2주마다 면봉 들고 거울 앞에 서는 거, 10년 뒤에도 이러고 있을 건가요? 5년 동안 가글만 200만원 쓴 제가 찾은 진짜 해답</div>
      <div class="meta">
        <span>건강덕후_수진</span>
        <span>2026. 3. 15.</span>
        <span>♥ 847</span>
      </div>
    </a>
  </div>

</div>

</div>
</body>
</html>
