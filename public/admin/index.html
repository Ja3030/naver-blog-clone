<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen" class="screen">
  <div class="login-box">
    <h1>Blog Admin</h1>
    <p>GitHub Personal Access Token을 입력하세요</p>
    <input type="password" id="pat-input" placeholder="ghp_xxxxxxxxxxxx">
    <button id="login-btn" onclick="doLogin()">로그인</button>
    <p id="login-error" class="error"></p>
  </div>
</div>

<!-- 게시글 목록 화면 -->
<div id="postlist-screen" class="screen" style="display:none">
  <header class="admin-header">
    <h1>Blog Admin — 게시글 관리</h1>
    <div class="header-actions">
      <button class="btn-secondary" onclick="loadPostList()">새로고침</button>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </header>
  <div class="postlist-container">
    <div id="postlist-grid" class="postlist-grid">
      <p class="postlist-loading">게시글 목록을 불러오는 중...</p>
    </div>
  </div>
</div>

<!-- 에디터 화면 -->
<div id="editor-screen" class="screen" style="display:none">
  <header class="admin-header">
    <h1>
      <button class="btn-back" onclick="backToList()">← 목록으로</button>
      <span>Post Editor</span>
    </h1>
    <div class="header-actions">
      <span id="deploy-status"></span>
      <a id="view-post-link" href="#" target="_blank" class="btn-secondary" style="text-decoration:none">글 보기 ↗</a>
      <button class="btn-secondary" onclick="loadPost()">새로고침</button>
      <button class="btn-primary" onclick="saveAll()">저장 & 배포</button>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <div class="editor-layout">
    <!-- 왼쪽: 본문 에디터 -->
    <div class="editor-main">
      <div class="panel">
        <div class="panel-header">
          <h2>본문 편집</h2>
        </div>
        <!-- 서식 툴바 (고정) -->
        <div class="format-toolbar" id="format-toolbar">
          <button onclick="execFmt('bold')" title="굵게"><b>B</b></button>
          <div class="toolbar-sep"></div>
          <select id="tb-fontsize-all" onchange="applyFontSizeAll(this.value); this.value=''" title="전체 글씨 크기">
            <option value="">전체</option>
            <option value="11">11</option>
            <option value="13">13</option>
            <option value="15">15</option>
            <option value="17">17</option>
            <option value="19">19</option>
            <option value="24">24</option>
            <option value="28">28</option>
            <option value="34">34</option>
          </select>
          <select id="tb-fontsize" onchange="applyFontSize(this.value); this.value=''">
            <option value="">크기</option>
            <option value="11">11</option>
            <option value="13">13</option>
            <option value="15">15</option>
            <option value="17">17</option>
            <option value="19">19</option>
            <option value="24">24</option>
            <option value="28">28</option>
            <option value="34">34</option>
          </select>
          <button onclick="applyColor('#000000')" title="검정" style="width:24px;height:24px;background:#000;border:2px solid #555;border-radius:4px;cursor:pointer"></button>
          <button onclick="applyColor('#e74c3c')" title="빨강" style="width:24px;height:24px;background:#e74c3c;border:2px solid #555;border-radius:4px;cursor:pointer"></button>
          <button onclick="applyColor('#2980b9')" title="파랑" style="width:24px;height:24px;background:#2980b9;border:2px solid #555;border-radius:4px;cursor:pointer"></button>
          <button onclick="applyColor('#27ae60')" title="초록" style="width:24px;height:24px;background:#27ae60;border:2px solid #555;border-radius:4px;cursor:pointer"></button>
          <button onclick="applyColor('#8e44ad')" title="보라" style="width:24px;height:24px;background:#8e44ad;border:2px solid #555;border-radius:4px;cursor:pointer"></button>
          <button onclick="applyColor('#e67e22')" title="주황" style="width:24px;height:24px;background:#e67e22;border:2px solid #555;border-radius:4px;cursor:pointer"></button>
          <input type="color" id="tb-color" value="#000000" onchange="applyColor(this.value)" title="커스텀 색" style="width:24px;height:24px;cursor:pointer">
          <div class="toolbar-sep"></div>
          <button onclick="insertHR()" title="구분선">― HR</button>
          <button onclick="insertImage()" title="이미지">🖼 이미지</button>
          <button onclick="insertCTA()" title="CTA" class="btn-cta">🔗 CTA</button>
        </div>
        <!-- 에디터 본문 -->
        <div id="editor" contenteditable="true" class="rich-editor">
        </div>
      </div>
    </div>

    <!-- 오른쪽: 설정 패널 -->
    <div class="editor-sidebar">
      <div class="panel">
        <h2>게시글 정보</h2>
        <label>제목<input type="text" id="cfg-post-title"></label>
        <label>카테고리<input type="text" id="cfg-category"></label>
        <label>날짜<input type="text" id="cfg-date"></label>
      </div>
      <div class="panel">
        <h2>블로그 정보</h2>
        <label>블로거 이름<input type="text" id="cfg-blog-name"></label>
        <label>블로그 제목<input type="text" id="cfg-blog-title"></label>
      </div>
      <div class="panel">
        <h2>소셜 증거</h2>
        <label>좋아요<input type="number" id="cfg-likes"></label>
        <label>공유<input type="number" id="cfg-shares"></label>
        <label>조회수<input type="number" id="cfg-views"></label>
      </div>
      <div class="panel">
        <h2>CTA 링크</h2>
        <label>URL<input type="text" id="cfg-cta-url"></label>
        <label>텍스트<input type="text" id="cfg-cta-text"></label>
      </div>
      <div class="panel">
        <h2>댓글</h2>
        <div id="comments-list"></div>
        <button class="btn-secondary" onclick="addComment()" style="margin-top:8px">+ 댓글 추가</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="image-upload" accept="image/*" style="display:none">
<script src="admin.js"></script>
</body>
</html>
